<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>짬뽕지도 - 랭킹</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .hard-shadow { box-shadow: 4px 4px 0 0 #1a1c1c; }
  .hard-shadow:hover { box-shadow: 2px 2px 0 0 #1a1c1c; transform: translate(2px, 2px); }
  .active-rank-tab { border-bottom-width: 4px; }
</style>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          background: "#f9f9f9",
          surface: "#ffffff",
          "surface-container": "#eeeeee",
          "surface-container-high": "#e8e8e8",
          "surface-variant": "#e2e2e2",
          "inverse-surface": "#2f3131",
          "on-background": "#1a1c1c",
          "on-surface": "#1a1c1c",
          "on-surface-variant": "#5b403d",
          primary: "#b7131a",
          "primary-container": "#db322f",
          "on-primary": "#ffffff",
          outline: "#906f6c",
          error: "#ba1a1a"
        },
        spacing: { "margin-desktop": "48px", "container-max": "1280px", gutter: "16px", "margin-mobile": "16px" },
        fontFamily: {
          "display-lg": ["Hanken Grotesk"],
          "headline-lg": ["Hanken Grotesk"],
          "title-md": ["Hanken Grotesk"],
          "label-caps": ["JetBrains Mono"],
          "body-sm": ["Inter"],
          "body-lg": ["Inter"]
        },
        fontSize: {
          "display-lg": ["48px", { lineHeight: "56px", fontWeight: "800" }],
          "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "700" }],
          "title-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
          "label-caps": ["12px", { lineHeight: "16px", fontWeight: "700" }],
          "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
          "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }]
        }
      }
    }
  };
</script>
</head>
<body class="bg-background text-on-background font-body-lg overflow-x-hidden">
<header class="bg-surface border-b-2 border-on-background sticky top-0 z-50">
  <div class="flex justify-between items-center w-full px-4 md:px-margin-desktop py-4 max-w-container-max mx-auto gap-6">
    <div class="flex items-center gap-8">
      <a class="font-display-lg text-3xl md:text-display-lg font-black text-primary" href="/">짬뽕지도</a>
      <nav class="hidden md:flex gap-6">
        <a class="font-title-md text-title-md text-primary border-b-4 border-primary pb-1" href="/">랭킹</a>
        <a class="font-title-md text-title-md text-on-surface-variant hover:text-primary transition-colors" href="map.html">지도</a>
        <a class="font-title-md text-title-md text-on-surface-variant hover:text-primary transition-colors" href="report.html">제보</a>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <form class="relative hidden sm:block" data-search-form>
        <input class="bg-surface-container text-on-surface border-2 border-on-background px-4 py-2 w-64 focus:outline-none font-body-sm" name="q" placeholder="지역 또는 매장 검색" type="search" />
        <button class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant" type="submit">search</button>
      </form>
      <button class="bg-primary text-on-primary px-6 py-2 font-title-md hard-shadow transition-all active:scale-95 duration-100" data-auth-button type="button">로그인</button>
    </div>
  </div>
</header>

<main class="max-w-container-max mx-auto px-4 md:px-margin-desktop py-12">
  <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
    <div>
      <h1 class="font-headline-lg text-headline-lg text-on-background mb-2">실시간 짬뽕 랭킹</h1>
      <p class="text-on-surface-variant font-body-lg">백엔드 API가 제공하는 전국 짬뽕 맛집 데이터를 확인하세요.</p>
    </div>
    <div class="flex items-center gap-3">
      <label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="region-filter">Region Filter</label>
      <select class="bg-surface border-2 border-on-background px-4 py-2 font-title-md focus:ring-0 focus:border-primary cursor-pointer" id="region-filter">
        <option value="">전국</option>
      </select>
    </div>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 border-2 border-on-background mb-8 bg-surface" id="rank-tabs">
    <button class="py-4 font-title-md border-r-2 border-on-background bg-primary text-on-primary active-rank-tab border-primary transition-colors" type="button">전국종합</button>
    <button class="py-4 font-title-md border-r-2 border-on-background text-on-surface-variant hover:bg-surface-container transition-colors" type="button">불향마스터</button>
    <button class="py-4 font-title-md border-r-2 border-on-background text-on-surface-variant hover:bg-surface-container transition-colors" type="button">가성비끝판왕</button>
    <button class="py-4 font-title-md text-on-surface-variant hover:bg-surface-container transition-colors" type="button">매운맛지옥</button>
  </div>

  <section class="border-2 border-on-background bg-surface overflow-hidden">
    <div class="hidden md:grid grid-cols-[80px_1fr_120px_140px_120px_160px] bg-inverse-surface text-on-primary py-3 px-6 font-label-caps text-label-caps border-b-2 border-on-background">
      <div>RANK</div>
      <div>RESTAURANT INFO</div>
      <div class="text-center">REGION</div>
      <div class="text-center">SPICINESS</div>
      <div class="text-center">AI SCORE</div>
      <div class="text-right">ACTION</div>
    </div>
    <div class="divide-y-2 divide-on-background min-h-[240px]" id="restaurant-list">
      <div class="p-8 text-center font-title-md text-on-surface-variant">랭킹 데이터를 불러오는 중입니다.</div>
    </div>
  </section>

  <div class="mt-12 flex justify-center gap-2" id="pagination"></div>
</main>

<footer class="bg-inverse-surface border-t-4 border-primary">
  <div class="flex flex-col md:flex-row justify-between items-center w-full px-4 md:px-margin-desktop py-12 max-w-container-max mx-auto gap-6">
    <div class="text-center md:text-left">
      <div class="font-title-md text-title-md font-bold text-white mb-3">짬뽕지도</div>
      <p class="font-body-sm text-surface-variant uppercase font-label-caps">Analytical flavor discovery engine.</p>
    </div>
    <div class="text-surface-variant font-label-caps text-label-caps">© 2024 JJAMPPONG MAP. ALL RIGHTS RESERVED.</div>
  </div>
</footer>

<script type="module" src="/src/api.js"></script>
<script type="module">
  const api = window.JjamppongAPI;
  const list = document.getElementById("restaurant-list");
  const pagination = document.getElementById("pagination");
  const regionFilter = document.getElementById("region-filter");
  const state = { page: Number(new URLSearchParams(location.search).get("page") || 1), regionCode: new URLSearchParams(location.search).get("region_code") || "" };

  function syncUrl() {
    const params = new URLSearchParams();
    if (state.regionCode) params.set("region_code", state.regionCode);
    if (state.page > 1) params.set("page", state.page);
    history.replaceState(null, "", `${location.pathname}${params.toString() ? `?${params}` : ""}`);
  }

  function renderRestaurantRow(restaurant, index) {
    const rank = (state.page - 1) * 20 + index + 1;
    return `
      <article class="grid grid-cols-1 md:grid-cols-[80px_1fr_120px_140px_120px_160px] items-center p-4 md:p-6 ${rank === 1 ? "bg-primary-container/5" : ""} hover:bg-surface-container-high transition-colors">
        <div class="flex md:block items-center justify-between mb-4 md:mb-0">
          <span class="font-display-lg text-display-lg ${rank === 1 ? "text-primary" : "text-on-background"} leading-none">${rank}</span>
          ${rank === 1 ? '<span class="md:hidden font-label-caps text-label-caps bg-primary text-on-primary px-2 py-1">TOP PICK</span>' : ""}
        </div>
        <div class="flex gap-4 items-center mb-4 md:mb-0">
          <div class="w-16 h-16 bg-surface-container border-2 border-on-background overflow-hidden flex-shrink-0">
            <img class="w-full h-full object-cover" src="${api.getPrimaryImage(restaurant)}" alt="${api.escapeHtml(restaurant.name)}" />
          </div>
          <div>
            <h3 class="font-title-md text-title-md text-on-background">${api.escapeHtml(restaurant.name)}</h3>
            <p class="font-body-sm text-on-surface-variant">${api.escapeHtml(restaurant.address || "주소 미상")} | ${api.soupStyleLabel(restaurant.soup_style)}</p>
          </div>
        </div>
        <div class="text-center font-label-caps text-label-caps text-on-surface-variant mb-4 md:mb-0">${api.escapeHtml(api.regionName(restaurant))}</div>
        <div class="flex justify-center mb-4 md:mb-0"><div class="flex gap-1">${api.spiceBlocks(restaurant.spice_level)}</div></div>
        <div class="text-center mb-4 md:mb-0">
          <span class="font-label-caps text-headline-lg text-on-background">${api.formatScore(restaurant.sentiment_score)}</span>
        </div>
        <div class="text-right">
          <a class="inline-block bg-on-background text-on-primary px-4 py-2 font-label-caps hard-shadow text-xs" href="reviews.html?id=${encodeURIComponent(restaurant.id)}">VIEW DETAILS</a>
        </div>
      </article>
    `;
  }

  async function loadRegions() {
    try {
      const data = await api.getRegions();
      const regions = api.unwrapResults(data);
      regionFilter.innerHTML = '<option value="">전국</option>' + regions.map((region) => `<option value="${api.escapeHtml(region.code)}">${api.escapeHtml(region.name)}</option>`).join("");
      regionFilter.value = state.regionCode;
    } catch (error) {
      console.warn(error);
    }
  }

  async function loadRestaurants() {
    list.innerHTML = '<div class="p-8 text-center font-title-md text-on-surface-variant">랭킹 데이터를 불러오는 중입니다.</div>';
    syncUrl();
    try {
      const data = await api.getRestaurants({ page: state.page, region_code: state.regionCode });
      const restaurants = api.unwrapResults(data);
      list.innerHTML = restaurants.length
        ? restaurants.map(renderRestaurantRow).join("")
        : '<div class="p-8 text-center font-title-md text-on-surface-variant">표시할 식당이 없습니다.</div>';
      api.renderPagination(pagination, data, state.page, (page) => {
        state.page = page;
        loadRestaurants();
      });
    } catch (error) {
      list.innerHTML = `<div class="p-8 text-center font-title-md text-error">${api.escapeHtml(error.message)}</div>`;
      pagination.innerHTML = "";
    }
  }

  regionFilter.addEventListener("change", () => {
    state.regionCode = regionFilter.value;
    state.page = 1;
    loadRestaurants();
  });

  document.querySelectorAll("#rank-tabs button").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll("#rank-tabs button").forEach((button) => {
        button.classList.remove("bg-primary", "text-on-primary", "active-rank-tab", "border-primary");
        button.classList.add("text-on-surface-variant");
      });
      tab.classList.add("bg-primary", "text-on-primary", "active-rank-tab", "border-primary");
      tab.classList.remove("text-on-surface-variant");
    });
  });

  loadRegions();
  loadRestaurants();
</script>
</body>
</html>
