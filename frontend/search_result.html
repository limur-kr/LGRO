<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>짬뽕지도 - 검색 결과</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800;900&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .hard-shadow { box-shadow: 4px 4px 0 0 #1a1c1c; }
  .hard-shadow:active { box-shadow: 0 0 0 0 #1a1c1c; transform: translate(4px, 4px); }
</style>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          background: "#f9f9f9",
          surface: "#ffffff",
          "surface-container": "#eeeeee",
          "surface-container-high": "#e8e8e8",
          "surface-variant": "#e2e2e2",
          "inverse-surface": "#2f3131",
          "on-background": "#1a1c1c",
          "on-surface": "#1a1c1c",
          "on-surface-variant": "#5b403d",
          primary: "#b7131a",
          "primary-container": "#db322f",
          "primary-fixed": "#ffdad6",
          "on-primary": "#ffffff",
          outline: "#906f6c",
          error: "#ba1a1a"
        },
        spacing: { "margin-desktop": "48px", "container-max": "1280px", gutter: "16px" },
        fontFamily: {
          "display-lg": ["Hanken Grotesk"],
          "headline-lg": ["Hanken Grotesk"],
          "title-md": ["Hanken Grotesk"],
          "label-caps": ["JetBrains Mono"],
          "body-sm": ["Inter"],
          "body-lg": ["Inter"]
        },
        fontSize: {
          "display-lg": ["48px", { lineHeight: "56px", fontWeight: "800" }],
          "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "700" }],
          "title-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
          "label-caps": ["12px", { lineHeight: "16px", fontWeight: "700" }],
          "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
          "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }]
        }
      }
    }
  };
</script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<header class="bg-surface border-b-2 border-on-background sticky top-0 z-50">
  <div class="flex justify-between items-center w-full px-4 md:px-margin-desktop py-4 max-w-container-max mx-auto gap-6">
    <div class="flex items-center gap-8">
      <a class="font-display-lg text-3xl md:text-display-lg font-black text-primary" href="/">짬뽕지도</a>
      <nav class="hidden md:flex gap-6">
        <a class="font-title-md text-title-md text-on-surface-variant hover:text-primary transition-colors" href="/">랭킹</a>
        <a class="font-title-md text-title-md text-on-surface-variant hover:text-primary transition-colors" href="map.html">지도</a>
        <a class="font-title-md text-title-md text-on-surface-variant hover:text-primary transition-colors" href="report.html">제보</a>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <form class="hidden md:flex items-center bg-surface-container px-3 py-1 border border-outline" data-search-form>
        <span class="material-symbols-outlined text-on-surface-variant mr-2">search</span>
        <input class="bg-transparent border-none focus:ring-0 text-body-sm font-body-sm w-56" name="q" placeholder="지역, 맛집 검색" type="search" />
      </form>
      <button class="bg-primary text-on-primary font-title-md text-body-sm px-6 py-2 hard-shadow hover:bg-primary-container transition-colors active:scale-95 duration-100" data-auth-button type="button">로그인</button>
    </div>
  </div>
</header>

<main class="flex-grow w-full max-w-container-max mx-auto px-4 md:px-margin-desktop py-8">
  <section class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
    <div>
      <p class="font-label-caps text-label-caps text-primary mb-2">SEARCH RESULT</p>
      <h1 class="font-headline-lg text-headline-lg">검색 결과 <span class="text-primary" id="result-count">0</span>건</h1>
      <p class="text-body-sm text-on-surface-variant mt-2"><span id="keyword-label">검색어</span>에 대한 식당 데이터를 API에서 불러옵니다.</p>
    </div>
    <form class="w-full md:w-auto flex border-2 border-on-background bg-white" data-search-form>
      <input class="w-full md:w-80 border-0 focus:ring-0 px-4 py-3" name="q" placeholder="다시 검색" type="search" />
      <button class="bg-on-background text-white px-5 font-label-caps" type="submit">검색</button>
    </form>
  </section>

  <section class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-gutter min-h-[260px]" id="search-results">
    <div class="col-span-full border-2 border-on-background bg-surface p-8 text-center font-title-md text-on-surface-variant">검색 결과를 불러오는 중입니다.</div>
  </section>

  <div class="mt-12 flex justify-center gap-2" id="pagination"></div>
</main>

<footer class="bg-inverse-surface border-t-4 border-primary">
  <div class="flex flex-col md:flex-row justify-between items-center w-full px-4 md:px-margin-desktop py-12 max-w-container-max mx-auto gap-6">
    <div>
      <h3 class="font-title-md text-title-md font-bold text-white mb-4">짬뽕지도</h3>
      <p class="font-body-sm text-body-sm text-surface-variant max-w-sm">© 2024 JJAMPPONG MAP. ALL RIGHTS RESERVED.</p>
    </div>
    <div class="flex gap-8">
      <a class="font-label-caps text-label-caps text-surface-variant hover:text-primary-fixed transition-colors" href="/">랭킹</a>
      <a class="font-label-caps text-label-caps text-surface-variant hover:text-primary-fixed transition-colors" href="map.html">지도</a>
      <a class="font-label-caps text-label-caps text-surface-variant hover:text-primary-fixed transition-colors" href="report.html">제보</a>
    </div>
  </div>
</footer>

<script type="module" src="/src/api.js"></script>
<script type="module">
  const api = window.JjamppongAPI;
  const params = new URLSearchParams(location.search);
  const state = { q: params.get("q") || "", page: Number(params.get("page") || 1) };
  const results = document.getElementById("search-results");
  const pagination = document.getElementById("pagination");
  const resultCount = document.getElementById("result-count");
  const keywordLabel = document.getElementById("keyword-label");

  document.querySelectorAll('[data-search-form] input[name="q"]').forEach((input) => {
    input.value = state.q;
  });

  function syncUrl() {
    const next = new URLSearchParams();
    if (state.q) next.set("q", state.q);
    if (state.page > 1) next.set("page", state.page);
    history.replaceState(null, "", `${location.pathname}${next.toString() ? `?${next}` : ""}`);
  }

  function renderCard(restaurant) {
    return `
      <a class="bg-white border-2 border-on-background hover:-translate-y-1 transition-transform group flex flex-col h-full" href="reviews.html?id=${encodeURIComponent(restaurant.id)}">
        <div class="relative h-48 overflow-hidden">
          <img class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-500" src="${api.getPrimaryImage(restaurant)}" alt="${api.escapeHtml(restaurant.name)}" />
          <div class="absolute bottom-0 right-0 bg-primary text-on-primary px-3 py-1 font-label-caps text-label-caps">AI ${api.formatScore(restaurant.sentiment_score)}점</div>
        </div>
        <div class="p-5 flex-grow flex flex-col">
          <div class="flex justify-between items-start gap-3 mb-2">
            <h3 class="font-title-md text-title-md group-hover:text-primary transition-colors">${api.escapeHtml(restaurant.name)}</h3>
            <span class="font-label-caps text-label-caps text-primary shrink-0">${api.escapeHtml(api.regionName(restaurant))}</span>
          </div>
          <p class="text-body-sm text-on-surface-variant mb-4 line-clamp-2">${api.escapeHtml(restaurant.address || "주소 미상")}</p>
          <div class="flex flex-wrap gap-1 mb-4">
            <span class="text-[10px] font-label-caps text-on-surface-variant px-2 py-0.5 border border-outline">#${api.soupStyleLabel(restaurant.soup_style)}</span>
            <span class="text-[10px] font-label-caps text-on-surface-variant px-2 py-0.5 border border-outline">#맵기 ${Number(restaurant.spice_level || 0)}</span>
          </div>
          <div class="mt-auto pt-4 border-t border-surface-variant flex justify-between items-center">
            <span class="text-body-sm text-on-surface-variant">${api.formatPrice(restaurant.average_price)}</span>
            <span class="font-label-caps text-label-caps text-primary">DETAIL</span>
          </div>
        </div>
      </a>
    `;
  }

  async function loadSearchResults() {
    keywordLabel.textContent = state.q ? `"${state.q}"` : "전체";
    syncUrl();
    if (!state.q) {
      results.innerHTML = '<div class="col-span-full border-2 border-on-background bg-surface p-8 text-center font-title-md text-on-surface-variant">검색어를 입력해 주세요.</div>';
      resultCount.textContent = "0";
      pagination.innerHTML = "";
      return;
    }

    results.innerHTML = '<div class="col-span-full border-2 border-on-background bg-surface p-8 text-center font-title-md text-on-surface-variant">검색 결과를 불러오는 중입니다.</div>';
    try {
      const data = await api.getRestaurants({ q: state.q, page: state.page });
      const restaurants = api.unwrapResults(data);
      resultCount.textContent = data && data.count !== undefined ? Number(data.count).toLocaleString("ko-KR") : restaurants.length.toLocaleString("ko-KR");
      results.innerHTML = restaurants.length
        ? restaurants.map(renderCard).join("")
        : '<div class="col-span-full border-2 border-on-background bg-surface p-8 text-center font-title-md text-on-surface-variant">검색 결과가 없습니다.</div>';
      api.renderPagination(pagination, data, state.page, (page) => {
        state.page = page;
        loadSearchResults();
      });
    } catch (error) {
      results.innerHTML = `<div class="col-span-full border-2 border-on-background bg-surface p-8 text-center font-title-md text-error">${api.escapeHtml(error.message)}</div>`;
      pagination.innerHTML = "";
    }
  }

  loadSearchResults();
</script>
</body>
</html>
